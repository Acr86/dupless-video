name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel an in-progress run when a newer commit is pushed to the same ref.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # System binaries/libs. ffmpeg + fpcalc (chromaprint) cover the few tests that resolve a real
      # binary; the Qt libs let PySide6 import under the offscreen platform. Most heavy work is mocked
      # or guarded by pytest.importorskip, so a missing piece skips a test rather than failing it.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ffmpeg libchromaprint-tools \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3

      # CPU-only ML stack: torch from the CPU wheel index (no CUDA — the verdict is identical, §0),
      # plus faiss-cpu and PyAV. The package's torch/av/faiss imports are all lazy, so these only
      # need to be present for the importorskip-guarded tests to actually run.
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install faiss-cpu av
          pip install -e ".[dev,ui,watch]"

      - name: Run test suite
        env:
          QT_QPA_PLATFORM: offscreen   # headless Qt for the PySide6 UI tests
        run: pytest -q
